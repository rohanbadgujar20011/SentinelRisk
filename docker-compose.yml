
version: "3.9"

name: sentinel-risk

services:

  # ============================================================
  # PostgreSQL
  # ============================================================

  postgres:
    image: postgres:17
    container_name: sentinel-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: sentinelrisk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sentinelrisk"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - sentinel-network


  # ============================================================
  # pgAdmin
  # ============================================================

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sentinel-pgadmin

    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sentinelrisk.com
      PGADMIN_DEFAULT_PASSWORD: admin

    ports:
      - "5050:80"

    depends_on:
      postgres:
        condition: service_healthy

    volumes:
      - pgadmin_data:/var/lib/pgadmin

    networks:
      - sentinel-network


  # ============================================================
  # Redis
  # ============================================================

  redis:
    image: redis:8-alpine
    container_name: sentinel-redis

    restart: unless-stopped

    ports:
      - "6379:6379"

    command: redis-server --appendonly yes

    volumes:
      - redis_data:/data

    networks:
      - sentinel-network


  # ============================================================
  # Redis Insight
  # ============================================================

  redis-insight:
    image: redis/redisinsight:latest
    container_name: sentinel-redis-insight

    restart: unless-stopped

    ports:
      - "5540:5540"

    volumes:
      - redis_insight_data:/data

    depends_on:
      - redis

    networks:
      - sentinel-network


  # ============================================================
  # Kafka (KRaft Mode)
  # ============================================================

  kafka:
    image: apache/kafka:latest
    container_name: sentinel-kafka

    restart: unless-stopped

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

    volumes:
      - kafka_data:/var/lib/kafka/data

    networks:
      - sentinel-network


  # ============================================================
  # Kafka UI
  # ============================================================

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: sentinel-kafka-ui

    restart: unless-stopped

    ports:
      - "8081:8080"

    depends_on:
      - kafka

    environment:
      KAFKA_CLUSTERS_0_NAME: sentinel-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

    networks:
      - sentinel-network


  # ============================================================
  # Prometheus
  # ============================================================

  prometheus:
    image: prom/prometheus:latest
    container_name: sentinel-prometheus

    restart: unless-stopped

    ports:
      - "9090:9090"

    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

    networks:
      - sentinel-network


  # ============================================================
  # Grafana
  # ============================================================

  grafana:
    image: grafana/grafana:latest
    container_name: sentinel-grafana

    restart: unless-stopped

    ports:
      - "3000:3000"

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

    volumes:
      - grafana_data:/var/lib/grafana

    depends_on:
      - prometheus

    networks:
      - sentinel-network


volumes:
  postgres_data:
  pgadmin_data:
  redis_data:
  redis_insight_data:
  kafka_data:
  grafana_data:


networks:
  sentinel-network:
    driver: bridge
